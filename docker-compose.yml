services:
  memos:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mymemos
    restart: unless-stopped
    ports:
      - "5230:5230"
    volumes:
      - ./.memos:/var/opt/memos
    environment:
      MEMOS_PORT: "5230"
      MEMOS_DRIVER: sqlite
      MEMOS_INSTANCE_URL: https://memos.x-zone.site
    networks:
      - web-network
networks:
  web-network:
    external: true
